name: Create Release

on:
  workflow_dispatch:
    inputs:
      input:
        description: "Category (ui/core/debug) for automatic versioning, OR exact tag (e.g. v1.0.0 or v1.0.0-ui) to skip the version bump. If a suffix is given, it's used only to set the category — the tag itself is always created without the suffix. Empty defaults to ui."
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: "Tagly"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # ─────────────────────────────────────────────
      # 1. Resolve category and version source
      # ─────────────────────────────────────────────
      - name: Resolve trigger source
        run: |
          python3 - << 'PYEOF'
          import os
          import re

          raw = os.environ.get("IN_INPUT", "").strip()

          valid_categories = {"ui", "core", "debug"}
          manual_tag = ""
          category = ""

          # vX.Y.Z[-ui|-core|-debug] -> tag, otherwise treat as category
          # The suffix (if present) is used ONLY to identify the category;
          # the tag itself is always created clean, without the suffix.
          tag_match = re.match(r'^(v\d+\.\d+\.\d+)(?:-(ui|core|debug))?$', raw)

          if tag_match:
              manual_tag = tag_match.group(1)
              category = tag_match.group(2) or "ui"
          elif raw:
              category_lower = raw.lower()
              if category_lower not in valid_categories:
                  print(f"::error::Invalid input '{raw}'. Expected a category (ui/core/debug) or a tag (vX.Y.Z[-ui/-core/-debug])")
                  raise SystemExit(1)
              category = category_lower
          else:
              category = "ui"

          print(f"Category      : {category}")
          print(f"Manual tag    : '{manual_tag}'")

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"CATEGORY={category}\n")
              env.write(f"MANUAL_TAG={manual_tag}\n")
          PYEOF
        env:
          IN_INPUT: ${{ github.event.inputs.input }}

      # ─────────────────────────────────────────────
      # 2. Collect commits since the last semantic tag
      # ─────────────────────────────────────────────
      - name: Collect commits since last version tag
        run: |
          git fetch --tags --force

          # Latest vX.Y.Z tag
          LAST_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' \
            | head -1 || echo "")

          echo "Last version tag: '$LAST_TAG'"
          echo "LAST_TAG=$LAST_TAG" >> $GITHUB_ENV

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" "$LAST_TAG"..HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          echo "Commits collected:"
          echo "$COMMITS"
          echo "$COMMITS" > /tmp/commits.txt

      # ─────────────────────────────────────────────
      # 3. Compute next semantic version from commit prefixes
      # ─────────────────────────────────────────────
      - name: Compute next version from commit prefixes
        if: env.MANUAL_TAG == ''
        run: |
          python3 - << 'PYEOF'
          import re
          import os

          with open("/tmp/commits.txt") as f:
              commits = [l.strip() for l in f.readlines() if l.strip()]

          last_tag = os.environ.get("LAST_TAG", "").strip()
          last_version = last_tag[1:] if last_tag.startswith("v") else (last_tag or "0.0.0")

          try:
              major, minor, patch = (int(x) for x in last_version.split("."))
          except ValueError:
              major, minor, patch = 0, 0, 0

          bump = "patch"  # default when no recognized prefix

          # Commit prefix detection
          breaking_re = re.compile(r'^(feat|fix|refactor|perf|build|ci|chore|docs|style|test)(\([^)]*\))?!:')
          feat_re     = re.compile(r'^feat(\([^)]*\))?:')

          has_breaking = False
          has_feat = False

          for c in commits:
              if "BREAKING CHANGE" in c or breaking_re.match(c) or re.match(r'^break(\([^)]*\))?:', c):
                  has_breaking = True
              elif feat_re.match(c):
                  has_feat = True

          if has_breaking:
              bump = "major"
          elif has_feat:
              bump = "minor"
          else:
              bump = "patch"

          if bump == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump == "minor":
              minor += 1
              patch = 0
          else:
              patch += 1

          next_version = f"{major}.{minor}.{patch}"

          print(f"Last version : {last_version}")
          print(f"Bump type    : {bump}")
          print(f"Next version : {next_version}")

          with open(os.environ["GITHUB_ENV"], "a") as env:
              env.write(f"NEXT_VERSION={next_version}\n")
              env.write(f"BUMP_TYPE={bump}\n")

          # Also write to a temp file so THIS SAME step's bash can read it.
          # ($GITHUB_ENV entries only become real env vars starting on the NEXT step,
          # so reading ${NEXT_VERSION} further down in this same script was always empty
          # -> that's why VERSION ended up being just "v")
          with open("/tmp/next_version.txt", "w") as f:
              f.write(next_version)
          PYEOF

          NEXT_VERSION=$(cat /tmp/next_version.txt)
          VERSION="v${NEXT_VERSION}"
          ZIP_NAME="tagly-${VERSION}-${{ env.CATEGORY }}.zip"

          echo "✅ Next version : $VERSION"
          echo "✅ ZIP name     : $ZIP_NAME"

          echo "VERSION=$VERSION"   >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 3b. Use manually provided tag
      # ─────────────────────────────────────────────
      - name: Use manual tag
        if: env.MANUAL_TAG != ''
        run: |
          VERSION="${{ env.MANUAL_TAG }}"
          ZIP_NAME="tagly-${VERSION}-${{ env.CATEGORY }}.zip"

          echo "✅ Manual version : $VERSION"
          echo "✅ ZIP name       : $ZIP_NAME"

          echo "VERSION=$VERSION"   >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # ─────────────────────────────────────────────
      # 4. AI changelog rewrite (Gemini)
      # ─────────────────────────────────────────────
      - name: AI changelog rewrite via Gemini
        run: |
          COMMITS=$(cat /tmp/commits.txt)

          PROMPT="You are a release-notes writer. Rewrite the following git commit messages as a polished, user-facing changelog. Respond ONLY with a valid JSON object, no markdown, no explanation.

          Commit messages (one per line):
          $COMMITS

          Changelog writing rules:
          - Rewrite each commit message as a polished, user-facing release note — do NOT copy the raw commit text
          - Use a professional release tone: clear, concise, and written for end users (not developers)
          - Always start each item with a capital letter and a strong past-tense verb (e.g. Added, Fixed, Improved, Removed, Updated)
          - Strip any conventional commit prefixes (feat:, fix:, chore:, etc.) from the output
          - Each item MUST start with '- ' (dash followed by a space) for markdown formatting
          - Bad example (raw commit): '- add README.md in english'
          - Good example (release note): '- Added English README documentation'
          - Bad example (raw commit): '- exclude duplicate (N) files from source media scan'
          - Good example (release note): '- Fixed duplicate file exclusion during source media scan'

          Respond ONLY with this exact JSON structure:
          {
            \"changelog\": [
              \"- Improved X to do Y\",
              \"- Fixed Z issue\"
            ]
          }"

          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
                }]
              }],
              \"generationConfig\": {
                \"temperature\": 0.2,
                \"responseMimeType\": \"application/json\"
              }
            }")

          echo "Gemini raw response:"
          echo "$RESPONSE"
          echo "$RESPONSE" > /tmp/gemini_raw.json

          # Detect API errors — STOP the workflow if Gemini failed.
          # (Previously this only warned and let the job continue with a
          # raw-commit fallback, which is what was producing changelogs
          # even when the Gemini call errored out.)
          python3 - << 'PYEOF'
          import json
          import sys

          with open("/tmp/gemini_raw.json") as f:
              try:
                  data = json.load(f)
              except json.JSONDecodeError:
                  data = {}

          err = data.get("error", {})
          if err:
              code    = err.get("code", "?")
              status  = err.get("status", "?")
              message = err.get("message", "unknown error")
              print(f"::error::Gemini API failed [{code}] {status} — {message}")
              sys.exit(1)
          PYEOF

          AI_JSON=$(python3 -c "
          import json
          try:
              with open('/tmp/gemini_raw.json') as f:
                  data = json.load(f)
              if data.get('error'):
                  print('')
              else:
                  text = data['candidates'][0]['content']['parts'][0]['text']
                  text = text.strip().strip('\`')
                  if text.startswith('json'):
                      text = text[4:].strip()
                  print(text)
          except Exception:
              print('')
          " 2>/dev/null || echo "")

          echo "$AI_JSON" > /tmp/ai_response.json

          python3 - << 'PYEOF'
          import json

          changelog_path = "/tmp/changelog.txt"
          commits_path   = "/tmp/commits.txt"

          normalized = []
          try:
              with open("/tmp/ai_response.json") as f:
                  content = f.read().strip()
              if content:
                  d = json.loads(content)
                  for item in d.get("changelog", []):
                      line = item.strip()
                      if not line:
                          continue
                      if not line.startswith("- "):
                          line = "- " + line.lstrip("- ").strip()
                      normalized.append(line)
          except Exception as e:
              print(f"⚠️  Could not parse Gemini changelog ({e}) — falling back to raw commits")

          # Fallback to raw commits
          if not normalized:
              try:
                  with open(commits_path) as f:
                      lines = [l.strip() for l in f.readlines() if l.strip()]
              except FileNotFoundError:
                  lines = []
              for line in lines:
                  if not line.startswith("- "):
                      line = "- " + line.lstrip("- ").strip()
                  normalized.append(line)

          if not normalized:
              normalized = ["- No significant changes in this release"]

          with open(changelog_path, "w") as f:
              f.write("\n".join(normalized))

          print(f"✅ Final changelog — {len(normalized)} item(s):")
          for l in normalized:
              print(l)
          PYEOF

      # ─────────────────────────────────────────────
      # 5. Create the semantic vX.Y.Z tag
      # ─────────────────────────────────────────────
      - name: Create semantic version tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -d "${{ env.VERSION }}" 2>/dev/null || true
          git push origin ":refs/tags/${{ env.VERSION }}" 2>/dev/null || true

          # Tag annotation = category
          git tag "${{ env.VERSION }}" -m "${{ env.CATEGORY }}"
          git push origin "${{ env.VERSION }}"
          echo "✅ Tag ${{ env.VERSION }} created with annotation '${{ env.CATEGORY }}'"

      # ─────────────────────────────────────────────
      # 6. Build
      # ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build:all

      - name: Package bundles
        run: |
          cd dist
          zip -r "../${{ env.ZIP_NAME }}" .
          cd ..

      # ─────────────────────────────────────────────
      # 7. Build release notes
      # ─────────────────────────────────────────────
      - name: Build release notes
        run: |
          CHANGELOG_CONTENT=$(cat /tmp/changelog.txt)

          cp .github/templates/release-notes.md release_notes.md

          echo "$CHANGELOG_CONTENT" > /tmp/cl_final.txt
          sed -i '/{{CHANGELOG_CONTENT}}/r /tmp/cl_final.txt' release_notes.md
          sed -i '/{{CHANGELOG_CONTENT}}/d' release_notes.md

      # ─────────────────────────────────────────────
      # 8. Create the GitHub Release
      # ─────────────────────────────────────────────
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS="${{ env.ZIP_NAME }}"

          xml_file=$(find . -name "*.xml" -type f | head -1)

          if [ -n "$xml_file" ]; then
            NEW_XML_NAME="${PROJECT_NAME}-${{ env.VERSION }}.prj.xml"
            SAFE_NAME=$(echo "$NEW_XML_NAME" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

            cp "$xml_file" "$SAFE_NAME"

            perl -0777 -i -pe \
              's|(<pvn>%tg_project_version</pvn>[\s\S]*?<pvv>)[^<]*(</pvv>)|${1}'"${{ env.VERSION }}"'${2}|' \
              "$SAFE_NAME"

            perl -0777 -i -pe \
              's|(<ProfileVariable\s[^>]*>\s*<clearout>[^<]*</clearout>\s*<exportval>)[^<]*(</exportval>[\s\S]*?<pvn>%tg_project_version</pvn>)|${1}'"${{ env.VERSION }}"'${2}|' \
              "$SAFE_NAME"

            echo "✅ XML version updated to ${{ env.VERSION }} in $SAFE_NAME"
            ASSETS="$ASSETS $SAFE_NAME"
          fi

          CATEGORY_UPPER=$(echo "${{ env.CATEGORY }}" | tr '[:lower:]' '[:upper:]')

          PRERELEASE_FLAG=""
          if [ "${{ env.CATEGORY }}" = "debug" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ env.VERSION }}" \
            --title "🚀 [${CATEGORY_UPPER}] ${PROJECT_NAME} ${{ env.VERSION }}" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG \
            $ASSETS
